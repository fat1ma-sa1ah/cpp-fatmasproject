<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة السودوكو</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">لعبة السودوكو</h1>
            <p class="subtitle">املأ المربعات بالأرقام من 1 إلى 4</p>
        </header>

        <main class="game-container">
            <div class="game-info">
                <div class="timer">
                    <span class="timer-label">الوقت:</span>
                    <span id="timer" class="timer-value">00:00</span>
                </div>
                <div class="moves">
                    <span class="moves-label">الحركات:</span>
                    <span id="moves" class="moves-value">0</span>
                </div>
            </div>

            <div class="sudoku-board" id="sudoku-board">
                <!-- Grid will be generated by JavaScript -->
            </div>

            <div class="controls">
                <button id="new-game" class="btn btn-primary">لعبة جديدة</button>
                <button id="hint" class="btn btn-secondary">مساعدة</button>
                <button id="check" class="btn btn-success">تحقق</button>
                <button id="reset" class="btn btn-warning">إعادة تعيين</button>
            </div>

            <div class="number-selector">
                <button class="number-btn" data-number="1">1</button>
                <button class="number-btn" data-number="2">2</button>
                <button class="number-btn" data-number="3">3</button>
                <button class="number-btn" data-number="4">4</button>
                <button class="number-btn clear-btn" data-number="0">مسح</button>
            </div>

            <div class="message" id="message"></div>
        </main>

        <footer class="footer">
            <p>استمتع بلعبة السودوكو الممتعة!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
